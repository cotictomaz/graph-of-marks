# ==========================================
# Global settings
# ==========================================
base_dir: "/content/drive/MyDrive/BDTM/gablation_studies"
backend: "vllm"       # "ollama" or "vllm"
n_runs: 2
num_examples: 3       # -1 to use the full dataset
force_reprocess: true # if true, overwrites existing preprocessed images

questions_path: "/content/MultipleChoice_mscoco_val2014_questions.json"
annotations_path: "/content/mscoco_val2014_annotations.json"
images_dir: "/content/val2014"

# ==========================================
# Ablation experiments
# ==========================================
# Each experiment in `experiments` varies one or more preprocessing parameters
# across an ablation_grid and evaluates every model in `models` on the results.
ablations:
  enabled: true
  skip_preprocessing: true  # if true, assumes images already exist and skips to inference
  run_vlm: true             # if false, stops after preprocessing (useful to inspect images)

  models:
    - "Qwen/Qwen2.5-VL-3B-Instruct"
  # models:
  #   - "moondream"
  #   - "qwen2.5vl:3b"

  experiments:

    ablate_edge_thickness:
      ablation_grid:
        rel_arrow_linewidth: [0.5, 3.0]

    ablate_max_relations_global:
      ablation_grid:
        max_relations: [4, 12]

    ablate_max_relations_per_object:
      ablation_grid:
        max_relations_per_object: [0, 1, 2]

    ablate_edge_color:
      ablation_grid:
        edge_color: ["head", "tail", "neutral"]

# ==========================================
# VLM comparison experiment
# ==========================================
# Preprocesses images once with the default config (+ optional overrides),
# then runs every model in `models` on those images to compare VLM accuracy.
vlm_comparison:
  enabled: false
  skip_preprocessing: true  # if true, assumes images already exist and skips to inference

  models:
    - "Qwen/Qwen2.5-VL-3B-Instruct"

  # Optional preprocessing parameter overrides applied on top of the default config.
  # Leave empty ({}) to use the pipeline defaults unchanged.
  preprocessing_overrides: {}

# ==========================================
# Prompting techniques experiment
# ==========================================
# Preprocesses images once with the default config, then evaluates each enabled
# prompting strategy on every model in `models`.  The model is initialized once
# per model name and reused across strategies to avoid repeated GPU loading.
prompting:
  enabled: false
  skip_preprocessing: false  # if true, assumes images already exist in {base_dir}/preprocessed_images/prompting/default/

  models:
    - "Qwen/Qwen2.5-VL-3B-Instruct"

  # Optional preprocessing parameter overrides applied on top of the default config.
  preprocessing_overrides: {}

  strategies:
    # Current static prompt — included for a fair in-experiment baseline.
    baseline:
      enabled: true

    # Prepend n_shots textual examples before the question (no images).
    # Format: EXAMPLE N: CONTEXT: ... QUESTION: ... ANSWER: ...
    # Maximum n_shots is 6 (size of the built-in pool).
    few_shot:
      enabled: true
      n_shots: 3

    # Instruct the model to reason step by step, then emit "Answer: [short answer]".
    # Compatible with the existing answer parser (rsplit on the last "Answer:").
    chain_of_thought:
      enabled: true

    # Explicitly instruct the model to identify relevant objects and relations
    # from the scene graph before giving a concise answer.
    graph_guided:
      enabled: true
